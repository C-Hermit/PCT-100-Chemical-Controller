<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCT-100 上位机</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ==================== 连接栏 ==================== -->
    <div class="conn-bar">
        <input id="ipt-host"     class="conn-input"  value="47.98.170.180" placeholder="服务器">
        <input id="ipt-port"     class="conn-input sm" value="8081"        placeholder="端口">
        <input id="ipt-device"   class="conn-input"  value="PCT_100_013"  placeholder="Device ID">
        <button id="btn-connect" class="btn conn">连接</button>
    </div>
    <div id="conn-status" class="conn-status">未连接</div>

    <!-- ==================== 状态面板 ==================== -->
    <div class="panel">
        <div class="panel-title">实时状态</div>
        <div class="grid-2col">
            <div class="stat-card">
                <div class="stat-label">温度</div>
                <div class="stat-val" id="val-temp">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">光照</div>
                <div class="stat-val" id="val-light">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">灯光</div>
                <div class="stat-val" id="val-led">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">风扇</div>
                <div class="stat-val" id="val-fan">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">模式</div>
                <div class="stat-val" id="val-mode">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总闸</div>
                <div class="stat-val" id="val-power">--</div>
            </div>
        </div>
    </div>

    <!-- ==================== 控制面板 ==================== -->
    <div class="panel">
        <div class="panel-title">手动控制</div>
        <div class="btn-row">
            <button id="cmd-led-on"  class="btn ctrl">灯光 ON</button>
            <button id="cmd-led-off" class="btn ctrl">灯光 OFF</button>
        </div>
        <div class="btn-row">
            <button id="cmd-fan-on"  class="btn ctrl">风扇 ON</button>
            <button id="cmd-fan-off" class="btn ctrl">风扇 OFF</button>
        </div>
        <div class="btn-row">
            <button id="cmd-mode-auto"   class="btn ctrl">自动模式</button>
            <button id="cmd-mode-manual" class="btn ctrl">手动模式</button>
        </div>
        <div class="btn-row">
            <button id="cmd-get-status" class="btn ctrl">刷新状态</button>
        </div>
    </div>

    <!-- ==================== 阈值设置 ==================== -->
    <div class="panel">
        <div class="panel-title">阈值设置</div>
        <div class="form-row">
            <label>温度阈值 (°C)</label>
            <input id="ipt-temp-th" type="number" step="0.1" value="30.0">
            <button id="cmd-set-temp-th" class="btn sm">设置</button>
        </div>
        <div class="form-row">
            <label>光照阈值 (Lux)</label>
            <input id="ipt-light-th" type="number" step="1" value="300">
            <button id="cmd-set-light-th" class="btn sm">设置</button>
        </div>
    </div>

    <!-- ==================== 日志 ==================== -->
    <div class="panel">
        <div class="panel-title">日志</div>
        <div id="log-box" class="log-box"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
